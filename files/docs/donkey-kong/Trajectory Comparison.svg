<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
    <rect width="800" height="400" fill="#1e1e1e" rx="10" />
    
    <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Figure 2: Trajectory Comparison</text>
    
    <line x1="400" y1="70" x2="400" y2="350" stroke="#555555" stroke-width="2" stroke-dasharray="5,5" />
    
    <line x1="50" y1="320" x2="750" y2="320" stroke="#ffffff" stroke-width="4" />

    <text x="200" y="80" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ff4444" text-anchor="middle">1981: Fixed Arc</text>
    <text x="200" y="105" font-family="Arial, sans-serif" font-size="14" fill="#aaaaaa" text-anchor="middle">(High Commitment / State-Locked)</text>
    
    <path d="M 100 320 Q 200 120 300 320" fill="none" stroke="#ff4444" stroke-width="6" />
    
    <circle cx="100" cy="320" r="8" fill="#ffffff" />
    <circle cx="300" cy="320" r="8" fill="#ffffff" />
    <circle cx="200" cy="220" r="6" fill="#ff4444" /> <text x="600" y="80" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#44aaff" text-anchor="middle">Modern: Variable Arc</text>
    <text x="600" y="105" font-family="Arial, sans-serif" font-size="14" fill="#aaaaaa" text-anchor="middle">(Kinetic Freedom / Air Control)</text>

    <path d="M 500 320 Q 600 120 700 320" fill="none" stroke="#44aaff" stroke-width="6" stroke-opacity="0.4" />
    <text x="690" y="300" font-family="Arial, sans-serif" font-size="14" fill="#44aaff" stroke-opacity="0.8">Full Jump</text>

    <path d="M 500 320 Q 530 220 570 320" fill="none" stroke="#44aaff" stroke-width="5" stroke-dasharray="10,5" />
    <text x="510" y="260" font-family="Arial, sans-serif" font-size="14" fill="#44aaff">Short Hop</text>

    <path d="M 500 320 Q 600 120 520 280" fill="none" stroke="#44ffaa" stroke-width="5" />
    <polygon points="520,280 525,265 510,270" fill="#44ffaa" /> <text x="600" y="210" font-family="Arial, sans-serif" font-size="14" fill="#44ffaa">Air Control (Reverse)</text>

    <circle cx="500" cy="320" r="8" fill="#ffffff" />
</svg>
